[workspace]
members = ["crates/*"]
resolver = "3"

[workspace.dependencies]
color-eyre = "0.6"
crossterm = "0.29"
anstyle = "1.0.14"
anyhow = "1"
clap = "4"
clap_complete = "4"
clap_mangen = "0.2"
dashmap = "6"
glob = "0.3"
ignore = "0.4"
libc = "0.2"
nix = { version = "0.31", features = ["fs", "mman"] }
memmap2 = "0.9"
pagers-core = { path = "crates/pagers-core" }
pagers-tui = { path = "crates/pagers-tui" }
ratatui = "0.30"
rayon = "1.11"
tempfile = "3"
thiserror = "2"

[profile.release]
codegen-units = 1
lto = true
opt-level = "s"
strip = true
