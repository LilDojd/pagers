[workspace]
members = ["crates/*"]
resolver = "3"

[workspace.dependencies]
anstyle = "1.0.14"
anyhow = "1"
clap = "4"
clap_complete = "4"
clap_mangen = "0.2"
dashmap = "6"
glob = "0.3"
ignore = "0.4"
indicatif = "0.18"
libc = "0.2"
memmap2 = "0.9"
pagers-core = { path = "crates/pagers-core" }
rayon = "1.11"
tempfile = "3"
thiserror = "2"
