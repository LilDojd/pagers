name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Get version from tag
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV
      - name: Verify Cargo.toml version
        run: |
          if ! grep -q "version = \"$VERSION\"" crates/pagers-cli/Cargo.toml; then
            echo "Tag version does not match Cargo.toml" >&2
            exit 1
          fi
      - name: Create release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create $GITHUB_REF_NAME --draft --verify-tag --title $GITHUB_REF_NAME
    outputs:
      version: ${{ env.VERSION }}

  build-release:
    needs: create-release
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    env:
      CARGO: cargo
      TARGET_DIR: ./target
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            use-cross: true
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            use-cross: true
          - target: armv7-unknown-linux-gnueabihf
            os: ubuntu-latest
            use-cross: true
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            use-cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
          - target: aarch64-pc-windows-msvc
            os: windows-11-arm
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use-cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Set cargo command
        if: matrix.use-cross
        run: echo "CARGO=cross" >> $GITHUB_ENV

      - name: Build
        shell: bash
        run: ${{ env.CARGO }} build --locked --release --target ${{ matrix.target }}

      - name: Determine binary path
        id: bin
        shell: bash
        run: |
          EXE=""
          case ${{ matrix.target }} in
            *-pc-windows-*) EXE=".exe" ;;
          esac
          echo "BIN_PATH=target/${{ matrix.target }}/release/pagers${EXE}" >> $GITHUB_OUTPUT
          echo "BIN_NAME=pagers${EXE}" >> $GITHUB_OUTPUT

      - name: Strip binary (macOS)
        if: contains(matrix.os, 'macos')
        run: strip "${{ steps.bin.outputs.BIN_PATH }}"

      - name: Create archive
        id: archive
        shell: bash
        run: |
          version="${{ needs.create-release.outputs.version }}"
          name="pagers-v${version}-${{ matrix.target }}"

          mkdir -p "${name}"
          cp "${{ steps.bin.outputs.BIN_PATH }}" "${name}/"

          if [[ "${{ matrix.target }}" == *-pc-windows-* ]]; then
            7z a "${name}.zip" "${name}"
            echo "ASSET=${name}.zip" >> $GITHUB_OUTPUT
          else
            tar czf "${name}.tar.gz" "${name}"
            echo "ASSET=${name}.tar.gz" >> $GITHUB_OUTPUT
          fi

      - name: Upload release archive
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: gh release upload ${{ github.ref_name }} ${{ steps.archive.outputs.ASSET }}
