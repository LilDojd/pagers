name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  id-token: write
  contents: write

jobs:
  generate-changelog:
    name: Generate changelog
    runs-on: ubuntu-latest
    outputs:
      release_body: ${{ steps.git-cliff.outputs.content }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Generate a changelog
        uses: orhun/git-cliff-action@v4
        id: git-cliff
        with:
          config: cliff.toml
          args: -vv --latest --no-exec --github-repo ${{ github.repository }}

  build-release:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            nix-package: pagers-x86_64-unknown-linux-musl
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            nix-package: pagers-aarch64-unknown-linux-musl
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            nix-package: pagers-aarch64-unknown-linux-gnu
          - target: armv7-unknown-linux-gnueabihf
            os: ubuntu-latest
            nix-package: pagers-armv7-unknown-linux-gnueabihf
          - target: x86_64-apple-darwin
            os: macos-latest
            nix-package: pagers
          - target: aarch64-apple-darwin
            os: macos-latest
            nix-package: pagers
    steps:
      - uses: actions/checkout@v6
      - uses: DeterminateSystems/determinate-nix-action@v3
      - uses: DeterminateSystems/flakehub-cache-action@v3

      - name: Build
        run: nix build .#${{ matrix.nix-package }}

      - name: Create archive
        id: archive
        run: |
          version="${GITHUB_REF_NAME#v}"
          name="pagers-v${version}-${{ matrix.target }}"
          mkdir -p "${name}"
          cp result/bin/pagers "${name}/"
          tar czf "${name}.tar.gz" "${name}"
          echo "ASSET=${name}.tar.gz" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: ${{ steps.archive.outputs.ASSET }}

  create-release:
    needs: [generate-changelog, build-release]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Get version from tag
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Verify Cargo.toml version
        run: |
          if ! grep -q "version = \"$VERSION\"" crates/pagers-cli/Cargo.toml; then
            echo "Tag version does not match Cargo.toml" >&2
            exit 1
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Create release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --verify-tag \
            --title "$GITHUB_REF_NAME" \
            --notes-file <(echo '${{ needs.generate-changelog.outputs.release_body }}') \
            artifacts/**/*.tar.gz

  publish-crates-io:
    name: Publish on crates.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set the release version
        run: echo "RELEASE_VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Publish pagers-core
        run: |
          cargo publish --manifest-path crates/pagers-core/Cargo.toml \
            --locked --token ${{ secrets.CARGO_TOKEN }}
      - name: Wait for pagers-core to be indexed
        run: |
          crate_status="https://raw.githubusercontent.com/rust-lang/crates.io-index/master/pa/ge/pagers-core"
          until curl -s "$crate_status" | grep -q "\"vers\":\"${{ env.RELEASE_VERSION }}\""; do sleep 5; done
      - name: Publish pagers-tui
        run: |
          cargo publish --manifest-path crates/pagers-tui/Cargo.toml \
            --locked --token ${{ secrets.CARGO_TOKEN }}
      - name: Wait for pagers-tui to be indexed
        run: |
          crate_status="https://raw.githubusercontent.com/rust-lang/crates.io-index/master/pa/ge/pagers-tui"
          until curl -s "$crate_status" | grep -q "\"vers\":\"${{ env.RELEASE_VERSION }}\""; do sleep 5; done
      - name: Publish pagers
        run: |
          cargo publish --manifest-path crates/pagers-cli/Cargo.toml \
            --locked --token ${{ secrets.CARGO_TOKEN }}

  flakehub-publish:
    name: Publish to FlakeHub
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: DeterminateSystems/determinate-nix-action@v3
      - uses: DeterminateSystems/flakehub-cache-action@v3
      - uses: DeterminateSystems/flakehub-push@main
        with:
          visibility: public
          name: LilDojd/pagers
          include-output-paths: true
