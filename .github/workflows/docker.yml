name: Docker

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    name: Build (${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            nix-package: container-amd64
          - arch: arm64
            nix-package: container-arm64
    steps:
      - uses: actions/checkout@v6

      - uses: DeterminateSystems/determinate-nix-action@v3
      - uses: DeterminateSystems/flakehub-cache-action@v3

      - name: Build container image
        run: nix build .#${{ matrix.nix-package }}

      - name: Login to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine arch tag
        id: tag
        run: echo "value=sha-${GITHUB_SHA::7}-${{ matrix.arch }}" >> "$GITHUB_OUTPUT"

      - name: Push to GHCR
        if: github.event_name != 'pull_request'
        run: |
          nix run .#${{ matrix.nix-package }}.copyTo -- \
            docker://ghcr.io/${{ github.repository }}:${{ steps.tag.outputs.value }} \
            --dest-creds "${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}"

      - name: Push to Docker Hub
        if: github.event_name != 'pull_request'
        run: |
          nix run .#${{ matrix.nix-package }}.copyTo -- \
            docker://${{ secrets.DOCKER_HUB_USERNAME }}/pagers:${{ steps.tag.outputs.value }} \
            --dest-creds "${{ secrets.DOCKER_HUB_USERNAME }}:${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}"

      - name: Scan the image
        if: github.event_name != 'pull_request'
        uses: anchore/sbom-action@v0
        with:
          image: ghcr.io/${{ github.repository }}:${{ steps.tag.outputs.value }}

  manifest:
    name: Create multi-arch manifest
    if: github.event_name != 'pull_request'
    needs: build-push
    runs-on: ubuntu-latest
    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine tags
        id: tags
        run: |
          SHA="${GITHUB_SHA::7}"
          TAGS="sha-${SHA}"

          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
            TAGS="${TAGS} ${VERSION} latest"
          elif [[ "$GITHUB_REF" == refs/heads/main ]]; then
            TAGS="${TAGS} main"
          fi

          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"
          echo "sha=${SHA}" >> "$GITHUB_OUTPUT"
          echo "ghcr=ghcr.io/${{ github.repository }}" >> "$GITHUB_OUTPUT"
          echo "docker=${{ secrets.DOCKER_HUB_USERNAME }}/pagers" >> "$GITHUB_OUTPUT"

      - name: Create and push manifests
        run: |
          GHCR="${{ steps.tags.outputs.ghcr }}"
          DOCKER="${{ steps.tags.outputs.docker }}"
          SHA="${{ steps.tags.outputs.sha }}"

          for TAG in ${{ steps.tags.outputs.tags }}; do
            # GHCR
            docker manifest create "${GHCR}:${TAG}" \
              "${GHCR}:sha-${SHA}-amd64" \
              "${GHCR}:sha-${SHA}-arm64"
            docker manifest annotate "${GHCR}:${TAG}" "${GHCR}:sha-${SHA}-amd64" --os linux --arch amd64
            docker manifest annotate "${GHCR}:${TAG}" "${GHCR}:sha-${SHA}-arm64" --os linux --arch arm64
            docker manifest push "${GHCR}:${TAG}"

            # Docker Hub
            docker manifest create "${DOCKER}:${TAG}" \
              "${DOCKER}:sha-${SHA}-amd64" \
              "${DOCKER}:sha-${SHA}-arm64"
            docker manifest annotate "${DOCKER}:${TAG}" "${DOCKER}:sha-${SHA}-amd64" --os linux --arch amd64
            docker manifest annotate "${DOCKER}:${TAG}" "${DOCKER}:sha-${SHA}-arm64" --os linux --arch arm64
            docker manifest push "${DOCKER}:${TAG}"
          done

      - name: Image digest
        run: |
          GHCR="${{ steps.tags.outputs.ghcr }}"
          docker manifest inspect "${GHCR}:sha-${{ steps.tags.outputs.sha }}" | jq .digest
